version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rotacerta-db
    environment:
      POSTGRES_DB: rotacerta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rotacerta-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: rotacerta-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/rotacerta
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
